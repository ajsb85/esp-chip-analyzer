<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7F00FF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Gold / Cyan Metal Gradient -->
    <linearGradient id="chip-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141E30"/>
      <stop offset="100%" stop-color="#243B55"/>
    </linearGradient>

    <linearGradient id="trace-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>

    <linearGradient id="trace-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7F00FF"/>
      <stop offset="100%" stop-color="#E100FF"/>
    </linearGradient>

    <!-- Glowing filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="256" cy="256" r="220" fill="url(#bg-glow)"/>

  <!-- Outer Trace Rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#trace-cyan)" stroke-width="2" stroke-opacity="0.25" stroke-dasharray="10 15"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#trace-purple)" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="40 8"/>

  <!-- PCB Corner Traces -->
  <path d="M 90,90 L 140,140 L 170,140" fill="none" stroke="url(#trace-cyan)" stroke-width="3" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>
  <path d="M 422,90 L 372,140 L 342,140" fill="none" stroke="url(#trace-cyan)" stroke-width="3" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>
  <path d="M 90,422 L 140,372 L 170,372" fill="none" stroke="url(#trace-purple)" stroke-width="3" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>
  <path d="M 422,422 L 372,372 L 342,372" fill="none" stroke="url(#trace-purple)" stroke-width="3" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>

  <!-- Connection Pins (Pads) around the chip body -->
  <g fill="url(#trace-cyan)" opacity="0.85" filter="url(#glow)">
    <!-- Top Pins -->
    <rect x="180" y="105" width="8" height="24" rx="4"/>
    <rect x="210" y="105" width="8" height="24" rx="4"/>
    <rect x="240" y="105" width="8" height="24" rx="4"/>
    <rect x="270" y="105" width="8" height="24" rx="4"/>
    <rect x="300" y="105" width="8" height="24" rx="4"/>
    <rect x="330" y="105" width="8" height="24" rx="4"/>

    <!-- Bottom Pins -->
    <rect x="180" y="383" width="8" height="24" rx="4"/>
    <rect x="210" y="383" width="8" height="24" rx="4"/>
    <rect x="240" y="383" width="8" height="24" rx="4"/>
    <rect x="270" y="383" width="8" height="24" rx="4"/>
    <rect x="300" y="383" width="8" height="24" rx="4"/>
    <rect x="330" y="383" width="8" height="24" rx="4"/>

    <!-- Left Pins -->
    <rect x="105" y="180" width="24" height="8" rx="4"/>
    <rect x="105" y="210" width="24" height="8" rx="4"/>
    <rect x="105" y="240" width="24" height="8" rx="4"/>
    <rect x="105" y="270" width="24" height="8" rx="4"/>
    <rect x="105" y="300" width="24" height="8" rx="4"/>
    <rect x="105" y="330" width="24" height="8" rx="4"/>

    <!-- Right Pins -->
    <rect x="383" y="180" width="24" height="8" rx="4"/>
    <rect x="383" y="210" width="24" height="8" rx="4"/>
    <rect x="383" y="240" width="24" height="8" rx="4"/>
    <rect x="383" y="270" width="24" height="8" rx="4"/>
    <rect x="383" y="300" width="24" height="8" rx="4"/>
    <rect x="383" y="330" width="24" height="8" rx="4"/>
  </g>

  <!-- Main Silicon Die (Chip Body) -->
  <rect x="128" y="128" width="256" height="256" rx="18" fill="url(#chip-body)" stroke="#3a506b" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Subtle Internal Chip Frame -->
  <rect x="144" y="144" width="224" height="224" rx="10" fill="none" stroke="#2c3e50" stroke-width="2"/>

  <!-- Core processor graphic (glowing circular symbol) -->
  <circle cx="256" cy="256" r="48" fill="none" stroke="url(#trace-cyan)" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Glowing central node -->
  <circle cx="256" cy="256" r="12" fill="url(#trace-cyan)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="28" fill="none" stroke="url(#trace-purple)" stroke-width="2" stroke-dasharray="6 8" filter="url(#glow)"/>

  <!-- Internal Circuit Lines on the silicon package -->
  <path d="M 180,180 L 220,220 M 332,180 L 292,220 M 180,332 L 220,292 M 332,332 L 292,292" fill="none" stroke="url(#trace-cyan)" stroke-width="2" stroke-linecap="round" opacity="0.75" filter="url(#glow)"/>

  <!-- Diagonal Tech Cross -->
  <line x1="256" y1="170" x2="256" y2="200" stroke="url(#trace-cyan)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="312" x2="256" y2="342" stroke="url(#trace-cyan)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="170" y1="256" x2="200" y2="256" stroke="url(#trace-cyan)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="312" y1="256" x2="342" y2="256" stroke="url(#trace-cyan)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Chip Serial ID text graphic -->
  <text x="256" y="362" fill="hsl(186, 100%, 48%)" font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" letter-spacing="1" opacity="0.85">AN978 READY</text>
</svg>